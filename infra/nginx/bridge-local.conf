# Optional nginx config for local WSL — only needed if you want nginx
# in front of the bridge locally (e.g. for testing without a tunnel).
# With ngrok, this file is NOT required.
#
# Install: sudo cp bridge-local.conf /etc/nginx/sites-available/1dotdev-bridge
#          sudo ln -sf /etc/nginx/sites-available/1dotdev-bridge \
#                      /etc/nginx/sites-enabled/1dotdev-bridge
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name localhost;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
