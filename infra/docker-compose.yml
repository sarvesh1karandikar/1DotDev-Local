version: "3.8"

# Personal cloud services + ChromaDB vector store
# Run: docker compose up -d
# Media paths assume ~/media exists (adjust MEDIA_ROOT if needed)

x-media-root: &media-root "${HOME}/media"

services:

  # ─── ChromaDB — Vector store for RAG ──────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - "${HOME}/media/chroma-data:/chroma/chroma"
    environment:
      - CHROMA_SERVER_AUTHN_CREDENTIALS_FILE=""
      - CHROMA_SERVER_AUTHN_PROVIDER=""
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    restart: unless-stopped

  # ─── Immich — Photo & Video backup (Google Photos replacement) ────────────
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich-server
    command: ["start.sh", "immich"]
    ports:
      - "2283:3001"
    volumes:
      - "${HOME}/media/photos:/usr/src/app/upload"
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_HOSTNAME=immich-postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=immich_pass
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich-redis
    depends_on:
      - immich-redis
      - immich-postgres
    restart: unless-stopped

  immich-microservices:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich-microservices
    command: ["start.sh", "microservices"]
    volumes:
      - "${HOME}/media/photos:/usr/src/app/upload"
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_HOSTNAME=immich-postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=immich_pass
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=immich-redis
    depends_on:
      - immich-redis
      - immich-postgres
    restart: unless-stopped

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich-machine-learning
    volumes:
      - immich-ml-cache:/cache
    restart: unless-stopped

  immich-redis:
    image: redis:6.2-alpine
    container_name: immich-redis
    restart: unless-stopped

  immich-postgres:
    image: postgres:14-alpine
    container_name: immich-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=immich_pass
      - POSTGRES_DB=immich
    volumes:
      - "${HOME}/media/immich-db:/var/lib/postgresql/data"
    restart: unless-stopped

  # ─── Calibre-Web — Book library (Kindle/Goodreads replacement) ────────────
  calibre-web:
    image: linuxserver/calibre-web:latest
    container_name: calibre-web
    ports:
      - "8083:8083"
    volumes:
      - "${HOME}/media/books:/books"
      - calibre-web-config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
      - DOCKER_MODS=linuxserver/mods:universal-calibre  # enables Calibre CLI for conversions
    restart: unless-stopped

  # ─── Jellyfin — Video streaming (Netflix replacement) ─────────────────────
  jellyfin:
    image: linuxserver/jellyfin:latest
    container_name: jellyfin
    ports:
      - "8096:8096"
    volumes:
      - "${HOME}/media/videos:/media/videos"
      - jellyfin-config:/config
      - jellyfin-cache:/cache
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    # Uncomment for NVIDIA GPU transcoding (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    restart: unless-stopped

  # ─── arr stack — Automated media management ──────────────────────────────

  # Prowlarr — Indexer manager for all arr apps
  prowlarr:
    image: linuxserver/prowlarr:latest
    container_name: prowlarr
    ports:
      - "9696:9696"
    volumes:
      - prowlarr-config:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    restart: unless-stopped

  # Sonarr — TV series management
  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    ports:
      - "8989:8989"
    volumes:
      - sonarr-config:/config
      - "${HOME}/media/tv:/tv"
      - "${HOME}/media/downloads:/downloads"
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    depends_on:
      - qbittorrent
    restart: unless-stopped

  # Radarr — Movie management
  radarr:
    image: linuxserver/radarr:latest
    container_name: radarr
    ports:
      - "7878:7878"
    volumes:
      - radarr-config:/config
      - "${HOME}/media/movies:/movies"
      - "${HOME}/media/downloads:/downloads"
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    depends_on:
      - qbittorrent
    restart: unless-stopped

  # Lidarr — Music management
  lidarr:
    image: linuxserver/lidarr:latest
    container_name: lidarr
    ports:
      - "8686:8686"
    volumes:
      - lidarr-config:/config
      - "${HOME}/media/music:/music"
      - "${HOME}/media/downloads:/downloads"
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
    depends_on:
      - qbittorrent
    restart: unless-stopped

  # qBittorrent — Torrent client for downloads
  # ─── NordVPN — Community maintained VPN container (bubuntux) ──────────────
  nordvpn:
    image: bubuntux/nordvpn:latest
    container_name: nordvpn
    ports:
      - "8080:8080"      # qBittorrent web UI
      - "6881:6881"      # qBittorrent torrent port
      - "6881:6881/udp"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
    environment:
      - TOKEN=${NORD_VPN_TOKEN}
      - PROTOCOL=udp
      - COUNTRY=United States
      - OBFUSCATE=off
    restart: unless-stopped

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    network_mode: "container:nordvpn"  # Route all traffic through NordVPN
    volumes:
      - qbittorrent-config:/config
      - "${HOME}/media/downloads:/downloads"
      - /etc/localtime:/etc/localtime:ro
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Los_Angeles
      - WEBUI_PORT=8080
    depends_on:
      - nordvpn
    restart: unless-stopped

volumes:
  immich-ml-cache:
  calibre-web-config:
  jellyfin-config:
  jellyfin-cache:
  prowlarr-config:
  sonarr-config:
  radarr-config:
  lidarr-config:
  qbittorrent-config:
